name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install torch==2.8.0 torchaudio==2.8.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Lint and format check
        run: |
          ruff check iara/ tests/
          ruff format --check iara/ tests/

      - name: Type check
        run: python -m mypy iara/

      - name: Run tests
        run: python -m pytest tests/ -q -m "not integration" --cov=iara --cov-fail-under=90 --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Audit dependencies
        # GHSA-mrfv-m5wm-5w6w (pynacl<1.6) is ignored: discord.py==2.7.1 pins pynacl<1.6
        # and cannot be upgraded until discord.py relaxes the constraint.
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-mrfv-m5wm-5w6w
