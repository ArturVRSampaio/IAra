target-version = "py312"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501", # line too long — formatter handles wrappable code; string literals are exempt
]

[lint.per-file-ignores]
"tests/**" = ["B011"] # allow assert False in tests
